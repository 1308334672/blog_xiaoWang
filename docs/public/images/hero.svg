<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGrad)" opacity="0.15"/>

  <!-- Gradient definitions -->
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff85a2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b57aed;stop-opacity:0.3" />
    </radialGradient>
    <linearGradient id="flowerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff85a2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb3c8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b57aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4a0e4;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Cherry blossom petals -->
  <!-- Petal 1 (top) -->
  <ellipse cx="100" cy="62" rx="14" ry="22" fill="url(#flowerGrad)" transform="rotate(0, 100, 100)"/>
  <!-- Petal 2 (top-right) -->
  <ellipse cx="100" cy="62" rx="14" ry="22" fill="url(#flowerGrad)" transform="rotate(72, 100, 100)" opacity="0.9"/>
  <!-- Petal 3 (bottom-right) -->
  <ellipse cx="100" cy="62" rx="14" ry="22" fill="url(#flowerGrad)" transform="rotate(144, 100, 100)" opacity="0.85"/>
  <!-- Petal 4 (bottom-left) -->
  <ellipse cx="100" cy="62" rx="14" ry="22" fill="url(#flowerGrad)" transform="rotate(216, 100, 100)" opacity="0.9"/>
  <!-- Petal 5 (top-left) -->
  <ellipse cx="100" cy="62" rx="14" ry="22" fill="url(#flowerGrad)" transform="rotate(288, 100, 100)"/>

  <!-- Center circle -->
  <circle cx="100" cy="100" r="18" fill="url(#leafGrad)"/>
  <circle cx="100" cy="100" r="10" fill="#fff" opacity="0.6"/>
  <circle cx="100" cy="100" r="5" fill="#ff85a2"/>

  <!-- Small decorative dots -->
  <circle cx="60" cy="60" r="4" fill="#ffb3c8" opacity="0.7"/>
  <circle cx="140" cy="60" r="3" fill="#b57aed" opacity="0.6"/>
  <circle cx="65" cy="145" r="3" fill="#ffb3c8" opacity="0.5"/>
  <circle cx="140" cy="145" r="4" fill="#b57aed" opacity="0.7"/>
  <circle cx="40" cy="100" r="3" fill="#ff85a2" opacity="0.5"/>
  <circle cx="160" cy="100" r="2.5" fill="#b57aed" opacity="0.6"/>
</svg>
